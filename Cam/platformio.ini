[env:esp32s3cam]
platform = platformio/espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_port = COM6
monitor_port = COM6
monitor_rts = 0
monitor_dtr = 0

build_flags =
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM

lib_deps =
    espressif/esp32-camera